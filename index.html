<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <h1>Flight</h1>
        <p>Game</p>
      </div>

      <div class="stats">
        <div class="stat">
          <span>Score</span>
          <strong id="score">0</strong>
        </div>
        <div class="stat">
          <span>Best</span>
          <strong id="bestScore">0</strong>
        </div>
      </div>
    </header>

    <main class="game-shell">
      <section class="canvas-wrap">
        <canvas id="gameCanvas"></canvas>

        <div id="overlay" class="overlay visible">
          <div class="overlay-card">
            <div class="title-mark">FLIGHT</div>
            <h2 id="overlayTitle">Game</h2>
            <p id="overlayText">Press Space, click, or tap to fly.</p>
            <button id="startBtn">Start Game</button>
          </div>
        </div>
      </section>

      <section class="controls">
        <button id="pauseBtn">Pause</button>
        <button id="restartBtn">Restart</button>
      </section>

      <p class="hint">Keyboard: Space | Mouse: Click | Mobile: Tap</p>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
